<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemma Voice Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0d0d;
    color: #ececec;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    padding: 16px 20px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #header h1 { font-size: 18px; font-weight: 600; color: #fff; }
  #status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: #2a2a2a;
    color: #888;
  }
  #status.ready { background: #1a3a1a; color: #4caf50; }
  #status.loading { background: #3a2a1a; color: #ff9800; }
  #status.listening { background: #1a2a3a; color: #2196f3; }
  #status.speaking { background: #2a1a3a; color: #9c27b0; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user {
    background: #2563eb;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    background: #1e1e1e;
    color: #ececec;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border: 1px solid #2a2a2a;
  }
  .message.system {
    background: transparent;
    color: #666;
    align-self: center;
    font-size: 13px;
    font-style: italic;
  }
  #input-area {
    padding: 16px 20px;
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #text-input {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #ececec;
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 15px;
    resize: none;
    max-height: 120px;
    outline: none;
    font-family: inherit;
  }
  #text-input:focus { border-color: #2563eb; }
  .btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #voice-btn {
    background: #2563eb;
    color: white;
  }
  #voice-btn.listening {
    background: #ef4444;
    animation: pulse 1s infinite;
  }
  #send-btn {
    background: #2a2a2a;
    color: #888;
  }
  #send-btn.active { background: #2563eb; color: white; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  #loading-overlay {
    position: fixed;
    inset: 0;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 100;
  }
  #loading-overlay.hidden { display: none; }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid #2a2a2a;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { color: #888; font-size: 15px; text-align: center; padding: 0 40px; }
  #progress-bar {
    width: 200px;
    height: 4px;
    background: #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: #2563eb;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>

<!-- Pantalla de carga mientras descarga/carga Gemma -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Iniciando Gemma 3n...<br><small style="color:#555">La primera vez descarga ~2GB</small></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<!-- Cabecera -->
<div id="header">
  <h1>🤖 Gemma Voice</h1>
  <span id="status" class="loading">Cargando...</span>
</div>

<!-- Área de mensajes -->
<div id="messages">
  <div class="message system">Gemma 3n está cargando... Por favor espera.</div>
</div>

<!-- Área de entrada -->
<div id="input-area">
  <textarea id="text-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
  <button class="btn" id="send-btn">➤</button>
  <button class="btn" id="voice-btn">🎤</button>
</div>

<script type="module">
// ─── Importamos MediaPipe GenAI Tasks desde CDN ───────────────────────────────
import { FilesetResolver, LlmInference } from 
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai@0.10.14/genai_bundle.mjs';

// ─── Referencias al DOM ───────────────────────────────────────────────────────
const messagesEl   = document.getElementById('messages');
const statusEl     = document.getElementById('status');
const textInput    = document.getElementById('text-input');
const sendBtn      = document.getElementById('send-btn');
const voiceBtn     = document.getElementById('voice-btn');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText  = document.getElementById('loading-text');
const progressFill = document.getElementById('progress-fill');

// ─── Estado global ────────────────────────────────────────────────────────────
let llm = null;           // instancia del modelo
let isListening = false;  // si el micrófono está activo
let isSpeaking = false;   // si está leyendo en voz alta
let recognition = null;   // instancia de reconocimiento de voz

// ─── Historial de conversación ────────────────────────────────────────────────
// Guardamos los mensajes para dar contexto al modelo (memoria de conversación)
const conversationHistory = [];

// ─── System prompt: define la personalidad del asistente ─────────────────────
const SYSTEM_PROMPT = `Eres un asistente inteligente, útil y amigable llamado Gemma. 
Respondes de forma clara y concisa en español. 
Cuando el usuario hable contigo por voz, das respuestas más cortas y naturales.
Puedes ayudar con cualquier tema: preguntas generales, código, matemáticas, 
redacción, análisis, y mucho más.`;

// ─── Función para añadir mensajes al chat ─────────────────────────────────────
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  // Hacemos scroll automático al último mensaje
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

// ─── Función para actualizar el indicador de estado ──────────────────────────
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls;
}

// ─── Síntesis de voz (texto → audio) ─────────────────────────────────────────
function speak(text) {
  // Cancelamos cualquier voz anterior que pudiera estar sonando
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-ES';
  utterance.rate = 1.0;
  utterance.pitch = 1.0;
  utterance.onstart = () => {
    isSpeaking = true;
    setStatus('Hablando...', 'speaking');
  };
  utterance.onend = () => {
    isSpeaking = false;
    setStatus('Listo', 'ready');
  };
  window.speechSynthesis.speak(utterance);
}

// ─── Enviar mensaje al modelo y obtener respuesta ─────────────────────────────
async function sendMessage(userText) {
  if (!llm || !userText.trim()) return;

  // Mostramos el mensaje del usuario en el chat
  addMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });

  // Indicamos que está procesando
  setStatus('Pensando...', 'loading');
  const assistantDiv = addMessage('assistant', '...');

  // Construimos el prompt completo con historial para dar contexto
  let fullPrompt = SYSTEM_PROMPT + '\n\n';
  conversationHistory.forEach(msg => {
    fullPrompt += msg.role === 'user' 
      ? `Usuario: ${msg.content}\n` 
      : `Gemma: ${msg.content}\n`;
  });
  fullPrompt += 'Gemma:';

  let response = '';

  try {
    // Generamos respuesta con streaming (va apareciendo poco a poco)
    await llm.generateResponse(fullPrompt, (partial, done) => {
      response = partial;
      // Actualizamos el mensaje en tiempo real mientras se genera
      assistantDiv.textContent = partial || '...';
      messagesEl.scrollTop = messagesEl.scrollHeight;
      
      if (done) {
        // Guardamos la respuesta en el historial
        conversationHistory.push({ role: 'assistant', content: response });
        // Leemos la respuesta en voz alta
        speak(response);
      }
    });
  } catch (err) {
    assistantDiv.textContent = 'Error al generar respuesta. Inténtalo de nuevo.';
    console.error('Error LLM:', err);
    setStatus('Error', 'loading');
  }
}

// ─── Reconocimiento de voz (audio → texto) ───────────────────────────────────
function setupSpeechRecognition() {
  // Verificamos que el navegador lo soporta
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addMessage('system', 'Tu navegador no soporta reconocimiento de voz. Usa Chrome.');
    voiceBtn.style.display = 'none';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = false;      // para cuando detecta silencio
  recognition.interimResults = false;  // solo resultado final

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    textInput.value = transcript;
    // Enviamos automáticamente lo que se dijo
    sendMessage(transcript);
    textInput.value = '';
  };

  recognition.onend = () => {
    isListening = false;
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤';
    if (!isSpeaking) setStatus('Listo', 'ready');
  };

  recognition.onerror = (event) => {
    console.error('Error de voz:', event.error);
    isListening = false;
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤';
    setStatus('Listo', 'ready');
  };
}

// ─── Botón de micrófono ───────────────────────────────────────────────────────
voiceBtn.addEventListener('click', () => {
  if (!llm) return; // no hacemos nada si el modelo no está listo
  
  if (isListening) {
    recognition.stop();
  } else {
    // Cancelamos la voz si estaba hablando
    window.speechSynthesis.cancel();
    isListening = true;
    voiceBtn.classList.add('listening');
    voiceBtn.textContent = '⏹';
    setStatus('Escuchando...', 'listening');
    recognition.start();
  }
});

// ─── Botón de enviar texto ────────────────────────────────────────────────────
sendBtn.addEventListener('click', () => {
  const text = textInput.value.trim();
  if (text) {
    sendMessage(text);
    textInput.value = '';
  }
});

// Enviar también con Enter (sin Shift)
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

// Activar botón de enviar cuando hay texto
textInput.addEventListener('input', () => {
  sendBtn.classList.toggle('active', textInput.value.trim().length > 0);
});

// ─── Carga del modelo Gemma 3n ────────────────────────────────────────────────
async function loadModel() {
  try {
    loadingText.innerHTML = 'Preparando MediaPipe...<br><small style="color:#555">Esto solo tarda la primera vez</small>';
    
    // Resolvemos los archivos WASM de MediaPipe
    const genaiFileset = await FilesetResolver.forGenAiTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-genai@0.10.14/wasm'
    );

    loadingText.innerHTML = 'Descargando Gemma 3n...<br><small style="color:#555">Primera vez: ~2GB. Ten paciencia ☕</small>';
    progressFill.style.width = '10%';

    // Creamos la instancia del modelo
    // Usamos la versión de 1B de Gemma 3n optimizada para móvil
    llm = await LlmInference.createFromModelPath(genaiFileset, {
      // Modelo Gemma 3n E2B (versión ligera optimizada para móvil)
      modelPath: 'https://storage.googleapis.com/mediapipe-models/llm_inference/gemma3-1b-it-int4/float16/1/gemma3-1b-it-int4.task',
      maxTokens: 1024,
      topK: 40,
      temperature: 0.7,
      randomSeed: 42,
    });

    progressFill.style.width = '100%';
    
    // Ocultamos la pantalla de carga
    loadingOverlay.classList.add('hidden');
    
    // Actualizamos el estado
    setStatus('Listo', 'ready');
    
    // Limpiamos el mensaje de sistema y damos la bienvenida
    messagesEl.innerHTML = '';
    addMessage('assistant', '¡Hola! Soy Gemma, tu asistente de IA local. Estoy corriendo completamente en tu Pixel 9 Pro XL, sin enviar nada a internet. Puedes escribirme o pulsar el micrófono para hablar. ¿En qué puedo ayudarte?');
    
    // Iniciamos el reconocimiento de voz
    setupSpeechRecognition();
    
    // Leemos el mensaje de bienvenida en voz alta
    speak('¡Hola! Soy Gemma, tu asistente de inteligencia artificial local. ¿En qué puedo ayudarte?');

  } catch (err) {
    console.error('Error cargando modelo:', err);
    loadingText.innerHTML = `Error cargando Gemma: ${err.message}<br><small>Asegúrate de usar Chrome actualizado</small>`;
    progressFill.style.width = '0%';
  }
}

// ─── Iniciamos todo cuando carga la página ────────────────────────────────────
loadModel();
</script>
</body>
</html>
